name: Fetch Gold Silver Prices

on:
  push:
    branches: [main]
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prices from Arakkal
        run: |
          GOLD=$(curl -s "https://portal.arakkalmarkets.com/getprice/GOLD" | sed 's/<[^>]*>//g' | tr -s ' \n' '\n' | grep -E '^[0-9]+\.[0-9]+$' | head -1)
          SILVER=$(curl -s "https://portal.arakkalmarkets.com/getprice/SILVER" | sed 's/<[^>]*>//g' | tr -s ' \n' '\n' | grep -E '^[0-9]+\.[0-9]+$' | head -1)
          echo "{\"gold\":$GOLD,\"silver\":$SILVER,\"ok\":true,\"ts\":$(date +%s)}" > prices.json

      - name: Commit and push prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || (git commit -m "chore: update prices" && git pull --rebase && git push)
